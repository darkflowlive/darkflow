<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}canvas{display:block;}button{background:#00d4aa;color:#080810;border:none;padding:12px 28px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;border-radius:3px;cursor:pointer;}</style>
</head><body>
<canvas id="c" width="800" height="800"></canvas>
<button onclick="download()">⬇ DOWNLOAD PNG</button>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),W=800,H=800;
function draw(){
  ctx.fillStyle='#000000';ctx.fillRect(0,0,W,H);

  const cx=400,cy=370,size=210;
  const top={x:cx,y:cy-size*0.72},bl={x:cx-size*0.85,y:cy+size*0.52},br={x:cx+size*0.85,y:cy+size*0.52};

  // Black hole event horizon — concentric rings collapsing inward
  for(let i=18;i>=1;i--){
    const rad=i*22;
    const a=0.012*(19-i);
    ctx.save();
    ctx.strokeStyle=`rgba(0,212,170,${a})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,cy-10,rad,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // Gravitational lensing — lines bending toward center
  ctx.save();
  for(let i=0;i<36;i++){
    const ang=(Math.PI*2/36)*i;
    const startR=360,endR=140;
    const sx=cx+startR*Math.cos(ang),sy=(cy-10)+startR*Math.sin(ang);
    const ex=cx+endR*Math.cos(ang),ey=(cy-10)+endR*Math.sin(ang);
    const a=0.04+0.02*Math.sin(ang*3);
    ctx.strokeStyle=`rgba(0,180,140,${a})`;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(sx,sy);
    const mx=cx+(startR*0.6)*Math.cos(ang+0.15),my=(cy-10)+(startR*0.6)*Math.sin(ang+0.15);
    ctx.quadraticCurveTo(mx,my,ex,ey);ctx.stroke();
  }
  ctx.restore();

  // The void — black circle in center
  const voidG=ctx.createRadialGradient(cx,cy-10,0,cx,cy-10,120);
  voidG.addColorStop(0,'rgba(0,0,0,1)');
  voidG.addColorStop(0.7,'rgba(0,0,0,0.95)');
  voidG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=voidG;ctx.fillRect(0,0,W,H);

  // Accretion disk glow
  const ag=ctx.createRadialGradient(cx,cy-10,100,cx,cy-10,160);
  ag.addColorStop(0,'rgba(0,212,170,0.0)');
  ag.addColorStop(0.5,'rgba(0,212,170,0.12)');
  ag.addColorStop(1,'rgba(0,212,170,0.0)');
  ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);

  // Triangle — emerging from the void
  for(let g=6;g>=1;g--){
    ctx.save();ctx.strokeStyle=`rgba(0,212,170,${0.025*(7-g)})`;
    ctx.lineWidth=g*15;ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(top.x,top.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
    ctx.stroke();ctx.restore();
  }

  // Fill — barely visible, sucked into void
  const tf=ctx.createRadialGradient(cx,cy,0,cx,cy,size);
  tf.addColorStop(0,'rgba(0,0,0,0.8)');tf.addColorStop(1,'rgba(0,212,170,0.06)');
  ctx.beginPath();ctx.moveTo(top.x,top.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.fillStyle=tf;ctx.fill();

  // Edge
  ctx.save();ctx.shadowColor='#00d4aa';ctx.shadowBlur=28;
  ctx.strokeStyle='rgba(0,212,170,0.9)';ctx.lineWidth=2.5;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(top.x,top.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.stroke();ctx.restore();

  // Vertex dots
  [top,bl,br].forEach(pt=>{
    const vg=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,22);
    vg.addColorStop(0,'rgba(0,255,200,0.7)');vg.addColorStop(1,'rgba(0,212,170,0)');
    ctx.fillStyle=vg;ctx.fillRect(pt.x-22,pt.y-22,44,44);
    ctx.save();ctx.shadowColor='#00ffcc';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(pt.x,pt.y,4,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,200,0.95)';ctx.fill();ctx.restore();
  });

  ctx.save();ctx.shadowColor='#00d4aa';ctx.shadowBlur=22;
  ctx.fillStyle='rgba(0,212,170,0.95)';ctx.font='700 50px IBM Plex Sans,sans-serif';
  ctx.textAlign='center';ctx.fillText('DARKFLOW',cx,br.y+68);ctx.restore();
  ctx.save();ctx.fillStyle='rgba(0,212,170,0.28)';ctx.font='400 13px IBM Plex Mono,monospace';
  ctx.textAlign='center';ctx.fillText('WE TELL YOU WHAT IT MEANS',cx,br.y+94);ctx.restore();
}
draw();
function download(){const a=document.createElement('a');a.download='darkflow-void.png';a.href=canvas.toDataURL('image/png');a.click();}
</script></body></html>
